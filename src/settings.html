<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CyberDesk Settings</title>
<link rel="icon" href="data:,">
<style>
/*__TOKENS__*/
/*__CSS__*/
</style>
</head>
<body>
  <main class="panel">
    <header class="panel-head">
      <span class="mark"></span>
      <div>
        <h1>Settings</h1>
        <p class="sub">CARVILON CyberDesk</p>
      </div>
    </header>

    <section class="rows">
      <div class="row">
        <div class="label">
          <span class="name">Feathered edges</span>
          <span class="hint">Soft alpha falloff at the surf-zone edge</span>
        </div>
        <div class="switch" data-key="feather_edges" role="switch" tabindex="0" aria-checked="false">
          <span class="knob"></span>
        </div>
      </div>

      <div class="row">
        <div class="label">
          <span class="name">Deep Field background</span>
          <span class="hint">Living procedural background behind the shell</span>
        </div>
        <div class="switch" data-key="deep_field" role="switch" tabindex="0" aria-checked="false">
          <span class="knob"></span>
        </div>
      </div>

      <div class="row">
        <div class="label">
          <span class="name">Stay in foreground</span>
          <span class="hint">Keep the fullscreen shell above other windows</span>
        </div>
        <div class="switch" data-key="stay_foreground" role="switch" tabindex="0" aria-checked="false">
          <span class="knob"></span>
        </div>
      </div>
    </section>

    <p class="status" id="status"></p>
  </main>

<script>
/*__JS__*/
</script>
</body>
</html>
