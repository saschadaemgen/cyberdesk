<body>
  <main class="start">
    <!-- The Energy Core: a bright hollow core inside concentric rotating arcs
         (the reserved CD-06 motif, finally at home). SVG + CSS, GPU-cheap. -->
    <div class="core" aria-hidden="true">
      <svg class="core-svg" viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
        <g class="ring ring-a">
          <circle r="92" pathLength="100" class="arc arc-thin"/>
        </g>
        <g class="ring ring-b">
          <circle r="72" pathLength="100" class="arc"/>
        </g>
        <g class="ring ring-c">
          <circle r="54" pathLength="100" class="arc arc-thin"/>
        </g>
        <circle r="30" class="hollow"/>
        <circle r="30" class="hollow-glow"/>
        <circle r="4.5" class="spark"/>
      </svg>
    </div>

    <!-- Search / address capsule - routes through the host's URL-vs-search
         classifier + the chosen search engine (same as the floating capsule). -->
    <form class="capsule" id="search" autocomplete="off">
      <span class="scheme" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          d="M11 4a7 7 0 1 0 4.9 12l4.1 4.1M11 4a7 7 0 0 1 7 7"/></svg>
      </span>
      <input id="q" class="q" type="text" placeholder="Search or enter address"
             autofocus spellcheck="false" aria-label="Search or enter address">
    </form>

    <!-- Favorite tiles (the CD-12 launcher language): click navigates this slot. -->
    <div class="tiles" id="tiles" aria-label="Favorites"></div>
  </main>

</body>
</html>
