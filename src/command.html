<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CyberDesk Command</title>
<link rel="icon" href="data:,">
<style>
/*__TOKENS__*/
/*__CSS__*/
</style>
</head>
<body>
  <div class="bar">
    <div class="row">
      <div class="nav">
        <button class="glyph" data-act="go_back" id="back" title="Back" aria-label="Back">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="glyph" data-act="go_forward" id="fwd" title="Forward" aria-label="Forward">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="glyph" data-act="reload" id="reload" title="Reload" aria-label="Reload">
          <svg viewBox="0 0 24 24" width="17" height="17"><path d="M20 11a8 8 0 10-.9 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M20 4v5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <span class="scheme neutral" id="scheme" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="15" height="15"><rect x="5" y="11" width="14" height="9" rx="1.5" fill="currentColor"/><path d="M8 11V8a4 4 0 018 0v3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </span>

      <input id="url" class="url" type="text" spellcheck="false" autocomplete="off"
             autocapitalize="off" placeholder="Search or enter address" />

      <button class="glyph star" id="star" title="Favorite (Ctrl+D)"
              aria-label="Favorite" aria-pressed="false">
        <svg viewBox="0 0 24 24" width="18" height="18"><path class="star-path"
          d="M12 3.6l2.6 5.27 5.82.85-4.21 4.1.99 5.79L12 16.87l-5.2 2.74.99-5.79-4.21-4.1 5.82-.85z"
          fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <!-- Favorites, shown as clickable chips while the input is untouched. -->
    <div class="chips" id="chips" aria-label="Favorites"></div>

    <!-- Live suggestions while the user is typing (favorites + history). -->
    <div class="suggestions" id="suggestions" role="listbox" aria-label="Suggestions"></div>
  </div>

<script>

</script>
</body>
</html>
